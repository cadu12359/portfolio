name: 🚀 Deploy API to Oracle VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/Portfolio.API/**'
      - 'src/Portfolio.Application/**'
      - 'src/Portfolio.Domain/**'
      - 'src/Portfolio.Infrastructure/**'
      - 'Dockerfile.api'
      - 'docker-compose.prod.yml'

jobs:
  deploy:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Executing remote ssh commands using key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/portfolio
            git pull origin main
            
            # Recarrega o docker apenas se algo no codigo mudou (a flag --build recompila o .NET)
            sudo docker compose -f docker-compose.prod.yml up -d --build api
            
            # Limpa imagens antigas para nao lotar o seu lindo HD de 47GB
            sudo docker image prune -f
