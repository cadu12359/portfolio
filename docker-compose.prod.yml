services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U portfolio_user -d portfolio" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=portfolio;Username=portfolio_user;Password=${POSTGRES_PASSWORD}
      - AllowedOrigins__0=https://cadu12359.github.io
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
